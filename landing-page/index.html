<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akshat Kumar | Portfolio</title>
    <meta name="description" content="Discover the creative universe of Akshat Kumar.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Premium Light Background with Animated Orbs -->
    <div class="bg-mesh">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="app-container">
        <header class="hero stagger-item">
            <div class="profile-avatar">
                <img src="https://ui-avatars.com/api/?name=Akshat+Kumar&background=0D8ABC&color=fff&size=120" alt="AK">
            </div>
            <h1 class="title">Akshat Kumar</h1>
            <p class="subtitle">Designing the future, one pixel at a time.</p>
        </header>

        <nav class="portfolio-nav">
            <!-- Basic Tier -->
            <a href="#" class="nav-card stagger-item basic-card">
                <div class="card-bg"></div>
                <div class="card-content">
                    <div class="icon-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                    </div>
                    <div class="text-content">
                        <h2>Basic</h2>
                        <p>The core foundation.</p>
                    </div>
                    <div class="action-arrow">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                    </div>
                </div>
            </a>

            <!-- Pro Tier -->
            <a href="../akshat-pro/" class="nav-card stagger-item pro-card">
                <div class="card-bg"></div>
                <div class="card-content">
                    <div class="icon-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                    </div>
                    <div class="text-content">
                        <h2>Pro</h2>
                        <p>Elevated design experiences.</p>
                    </div>
                    <div class="action-arrow">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                    </div>
                </div>
            </a>

            <!-- Ultra Tier -->
            <a href="../akshat-ultra/" class="nav-card stagger-item ultra-card">
                <div class="card-bg"></div>
                <div class="card-content">
                    <div class="icon-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                    </div>
                    <div class="text-content">
                        <h2>Ultra</h2>
                        <p>Immersive & flawless interactions.</p>
                    </div>
                    <div class="action-arrow">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                    </div>
                </div>
            </a>

            <!-- Extreme Tier (Dropdown) -->
            <div class="dropdown-wrapper stagger-item">
                <button class="nav-card extreme-card dropdown-trigger">
                    <div class="card-bg"></div>
                    <div class="card-content">
                        <div class="icon-wrapper">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="7.5 4.21 12 6.81 16.5 4.21"></polyline><polyline points="7.5 19.79 7.5 14.6 3 12"></polyline><polyline points="21 12 16.5 14.6 16.5 19.79"></polyline><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                        </div>
                        <div class="text-content">
                            <h2 class="flex-title">Extreme <span class="badge">BETA</span></h2>
                            <p>Pushing experimental limits.</p>
                        </div>
                        <div class="action-arrow chevron">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </div>
                    </div>
                </button>
                <div class="dropdown-menu">
                    <div class="dropdown-inner">
                        <a href="../extreme-1/" class="dropdown-item">
                            <div class="item-info">
                                <span class="item-title">Extreme 1</span>
                                <span class="item-desc">First iteration</span>
                            </div>
                            <span class="badge sm">BETA</span>
                        </a>
                        <a href="../extreme-2/" class="dropdown-item">
                            <div class="item-info">
                                <span class="item-title">Extreme 2</span>
                                <span class="item-desc">Second iteration</span>
                            </div>
                            <span class="badge sm">BETA</span>
                        </a>
                    </div>
                </div>
            </div>
        </nav>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Entry stagger animation
            const items = document.querySelectorAll('.stagger-item');
            items.forEach((item, index) => {
                setTimeout(() => {
                    item.classList.add('visible');
                }, 100 + (index * 120));
            });

            // Advanced hover 3D tilt effect for premium feel
            document.querySelectorAll('.nav-card').forEach(card => {
                card.addEventListener('mousemove', e => {
                    if (window.innerWidth < 768) return; // Disable on mobile
                    
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    
                    const rotateX = ((y - centerY) / centerY) * -5; // Max rotation 5deg
                    const rotateY = ((x - centerX) / centerX) * 5;
                    
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-5px)`;
                });
                
                card.addEventListener('mouseleave', () => {
                    card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) translateY(0)';
                });
            });
        });
    </script>
</body>
</html>
